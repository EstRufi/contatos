<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./app.js" defer type="module"></script>
    <title>Contatos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cadastro de Usuário</h1>
    </header>
    <main>
        <div class="content">
            <div class="cadastro">
                <div class="nomeCelular">
                    <label >Nome</label>
                    <input type="text" required id="nome">
    
                    <label>Celular</label>
                    <input type="text" required id="celular">
                </div>
                <div class="nomeCelular">
                    <label>Foto</label>
                    <input type="text" required id="foto">
    
                    <label>Email</label>
                    <input type="text" required id="email">
                </div>
                
                <div class="nomeCelular">
                    <label >Endereço</label>
                    <input  required type="text" id="endereco">
                    
                    <label >Cidade</label>
                    <input required type="text" id="cidade">
                </div>
                
               
            </div>

            <div class="bt-cadastro" >
                <button id="bt_cadastro">Cadastrar</button> 
            </div>
            <div class="tabela">
                <table>
                    <thead>
                    <tr>
                        <th>Id</th>
                        <th>Nome</th>
                        <th>Celular</th>
                        <th>Imagem</th>
                        <th>Email</th>
                        <th>Endereço</th>
                        <th>Cidade</th>
                    </tr>

                    </thead>
                    <tbody id="tabela">

                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
